.page{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:40px 24px 80px;}
.page-header{text-align:center;margin-bottom:36px;animation:fadeDown .9s ease both;}
.gold-rule{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.gold-rule .line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.gold-rule .dia{width:7px;height:7px;background:var(--gold);transform:rotate(45deg);flex-shrink:0;}
.portrait-section{display:flex;flex-direction:column;align-items:center;margin-bottom:10px;}
.portrait-img-wrap{position:relative;display:inline-block;filter:drop-shadow(0 8px 32px rgba(100,60,0,.22));}
.portrait-img-wrap img{width:clamp(260px,38vw,360px);display:block;}
.lady-name{margin-top:2px;font-family:"Great Vibes",cursive;font-size:clamp(2rem,5vw,2.8rem);color:var(--gold-dk);text-shadow:0 2px 12px rgba(160,120,30,.22),0 1px 0 rgba(255,255,255,.5);letter-spacing:2px;position:relative;display:inline-block;padding:0 24px;}
.lady-name::before,.lady-name::after{content:"✦";color:var(--gold);font-size:1rem;position:absolute;top:50%;transform:translateY(-50%);font-family:serif;font-style:normal;}
.lady-name::before{left:0;}.lady-name::after{right:0;}
.name-rule{display:flex;align-items:center;gap:12px;margin-top:8px;margin-bottom:4px;width:clamp(200px,50%,340px);}
.name-rule .l{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(200,168,75,.6));}
.name-rule .r{flex:1;height:1px;background:linear-gradient(90deg,rgba(200,168,75,.6),transparent);}
.name-rule .d{width:6px;height:6px;background:var(--gold);transform:rotate(45deg);flex-shrink:0;}
.header-sub{font-family:"IM Fell English",serif;font-style:italic;font-size:clamp(.85rem,2vw,1rem);color:var(--ink-lt);opacity:.82;margin-top:6px;}
.header-ornament{font-size:16px;color:var(--rose);letter-spacing:10px;opacity:.7;margin-top:6px;}
.write-link-wrap{text-align:right;margin-bottom:20px;}
.write-link{display:inline-block;font-family:"Cormorant Garamond",serif;font-size:.88rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold-dk);text-decoration:none;padding:9px 24px;background:rgba(253,248,238,.85);border:1px solid rgba(200,168,75,.5);border-radius:2px;transition:all .2s;backdrop-filter:blur(2px);}
.write-link:hover{background:rgba(253,248,238,.97);box-shadow:0 3px 14px rgba(100,60,0,.15);}
.sec-title{text-align:center;margin-bottom:22px;}
.sec-title h2{font-family:"Playfair Display",serif;font-size:clamp(1.15rem,3.5vw,1.6rem);color:var(--navy);font-weight:400;font-style:italic;}
.sec-rule{display:flex;align-items:center;gap:10px;margin-top:8px;}
.sec-rule .rl{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(200,168,75,.45));}
.sec-rule .rr{flex:1;height:1px;background:linear-gradient(90deg,rgba(200,168,75,.45),transparent);}
.sec-rule .ri{color:var(--rose);font-size:15px;}
.cards-count{display:block;text-align:center;margin-bottom:18px;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-dk);opacity:.8;}
.loading{text-align:center;padding:50px;font-family:"IM Fell English",serif;font-style:italic;color:rgba(42,30,16,.4);font-size:1rem;}
.spinner{display:inline-block;width:28px;height:28px;border:2px solid rgba(200,168,75,.3);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px;}
@keyframes spin{to{transform:rotate(360deg)}}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(245px,1fr));gap:18px;}
.card{position:relative;border-radius:3px;padding:26px 20px 18px;box-shadow:0 4px 22px rgba(80,50,0,.2),0 1px 6px rgba(80,50,0,.1);animation:popIn .5s cubic-bezier(.175,.885,.32,1.275) both;transition:transform .25s,box-shadow .25s;backdrop-filter:blur(1px);}
.card:hover{transform:translateY(-4px) rotate(.25deg);box-shadow:0 9px 34px rgba(80,50,0,.22);}
.card::before{content:"";position:absolute;inset:5px;border:1px solid rgba(255,255,255,.32);border-radius:2px;pointer-events:none;}
.bg-ivory{background:linear-gradient(135deg,rgba(253,248,238,.97),rgba(242,228,202,.97));}
.bg-lilac{background:linear-gradient(135deg,rgba(237,232,248,.97),rgba(216,204,238,.97));}
.bg-navy{background:linear-gradient(135deg,rgba(45,36,80,.97),rgba(61,52,104,.97));}
.bg-sage{background:linear-gradient(135deg,rgba(232,240,232,.97),rgba(200,220,200,.97));}
.bg-blush{background:linear-gradient(135deg,rgba(252,238,242,.97),rgba(240,208,216,.97));}
.bg-navy .card-to,.bg-navy .card-from,.bg-navy .card-text{color:var(--parchment);}
.bg-navy .card-text{color:rgba(242,224,196,.82);}
.bg-navy .card-divider{background:rgba(200,168,75,.35);}
.bg-navy .card-time{color:rgba(242,224,196,.4);}
.card-badge{position:absolute;top:-10px;right:14px;font-size:20px;line-height:1;}
.card-to{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(42,30,16,.45);margin-bottom:4px;}
.card-from{font-family:"Playfair Display",serif;font-size:1.12rem;font-weight:700;font-style:italic;color:var(--navy);margin-bottom:2px;}
.card-divider{height:1px;background:rgba(200,168,75,.3);margin:8px 0;}
.card-text{font-family:"IM Fell English",serif;font-size:.91rem;line-height:1.76;color:rgba(42,30,16,.82);word-break:break-word;}
.card-time{margin-top:9px;font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;opacity:.38;text-align:right;}
.empty-state{text-align:center;padding:56px 24px;color:rgba(42,30,16,.4);font-family:"IM Fell English",serif;font-style:italic;font-size:1rem;background:rgba(253,248,238,.65);border:1px dashed rgba(200,168,75,.3);border-radius:3px;backdrop-filter:blur(2px);}
.empty-state a{color:var(--gold-dk);text-decoration:none;border-bottom:1px solid rgba(200,168,75,.4);}
@keyframes fadeDown{from{opacity:0;transform:translateY(-24px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.86) rotate(-1.5deg)}to{opacity:1;transform:scale(1) rotate(0)}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:rgba(232,220,200,.4)}::-webkit-scrollbar-thumb{background:rgba(136,112,176,.3);border-radius:3px}
</style>
</head>

  <header class="page-header">
    <div class="gold-rule"><div class="line"></div><div class="dia"></div><div class="dia"></div><div class="dia"></div><div class="line"></div></div>

<script type="module">
  import { initializeApp }  from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyD1GJHiaoJPCeQMz4yQmpRFgKA4xXhYs8A",
    authDomain: "hyobin-day.firebaseapp.com",
    projectId: "hyobin-day",
    storageBucket: "hyobin-day.firebasestorage.app",
    messagingSenderId: "465234754180",
    appId: "1:465234754180:web:dbe05b871aa850369be0d1",
    measurementId: "G-HF22GGV6X0"
  });
  const db  = getFirestore(app);

  const MON = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  function fmtDate(ts) {
    if (!ts) return "";
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return MON[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear();
  }
  function esc(s) {
    return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  const q = query(collection(db, "letters"), orderBy("createdAt", "desc"));

  onSnapshot(q, (snap) => {
    const grid  = document.getElementById("grid");
    const count = document.getElementById("cards-count");
    const list  = snap.docs.map(d => ({id:d.id, ...d.data()}));

    count.textContent = list.length > 0 ? list.length + "통의 편지" : "";

    if (list.length === 0) {
      grid.innerHTML = `<div class="empty-state">아직 도착한 편지가 없습니다.<br><span style="font-size:.85rem;opacity:.6"><a href="write.html">편지 쓰기</a>에서 첫 편지를 남겨주세요.</span></div>`;
      return;
    }

    grid.innerHTML = list.map((m,i) => `
      <div class="card bg-${esc(m.color||"ivory")}" style="animation-delay:${i*0.06}s">
        <div class="card-badge">${esc(m.emoji||"💌")}</div>
        <div class="card-to">To. ${esc(m.to||"모두에게")}</div>
        <div class="card-from">${esc(m.from||"")}</div>
        <div class="card-divider"></div>
        <div class="card-text">${esc(m.msg||"").replace(/\n/g,"<br>")}</div>
        <div class="card-time">${fmtDate(m.createdAt)}</div>
      </div>`).join("");

  }, (err) => {
    console.error(err);
    document.getElementById("grid").innerHTML = `<div class="empty-state">데이터를 불러오지 못했습니다. 새로고침 해주세요.</div>`;
  });
</script>
</body>
</html>
