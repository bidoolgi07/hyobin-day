.page{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:40px 24px 80px;}
.page-header{text-align:center;margin-bottom:32px;animation:fadeDown .8s ease both;}
.gold-rule{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.gold-rule .line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.gold-rule .dia{width:7px;height:7px;background:var(--gold);transform:rotate(45deg);flex-shrink:0;}
.page-title{font-family:"Great Vibes",cursive;font-size:clamp(2.4rem,6vw,3.8rem);color:var(--gold-dk);line-height:1.05;text-shadow:0 2px 8px rgba(160,120,30,.18);}
.page-sub{font-family:"IM Fell English",serif;font-style:italic;font-size:clamp(.85rem,2vw,1rem);color:var(--ink-lt);opacity:.82;margin-top:6px;}
.page-ornament{font-size:16px;color:var(--rose);letter-spacing:10px;opacity:.7;margin-top:6px;}
.compose-wrap{background:linear-gradient(160deg,rgba(253,248,238,.97) 0%,rgba(240,228,200,.97) 100%);border:1px solid rgba(200,168,75,.55);border-radius:3px;padding:36px 40px 32px;position:relative;box-shadow:0 6px 32px rgba(80,40,0,.18),inset 0 1px 0 rgba(255,255,255,.8);backdrop-filter:blur(2px);animation:fadeUp .9s ease .15s both;}
.compose-wrap::before{content:"";position:absolute;inset:6px;border:1px solid rgba(200,168,75,.22);border-radius:2px;pointer-events:none;}
.cnr{position:absolute;width:28px;height:28px;}.cnr svg{width:100%;height:100%;}
.cnr.tl{top:8px;left:8px}.cnr.tr{top:8px;right:8px;transform:scaleX(-1)}.cnr.bl{bottom:8px;left:8px;transform:scaleY(-1)}.cnr.br{bottom:8px;right:8px;transform:scale(-1)}
.form-heading{font-family:"Playfair Display",serif;font-size:1.3rem;font-style:italic;color:var(--navy);text-align:center;margin-bottom:24px;padding-bottom:12px;border-bottom:1px solid rgba(200,168,75,.3);}
.form-heading span{color:var(--lilac-dk);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
@media(max-width:560px){.form-row{grid-template-columns:1fr;}}
.fg{display:flex;flex-direction:column;gap:4px;}
label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--navy);opacity:.6;font-weight:600;}
input[type="text"],textarea{background:rgba(255,255,255,.58);border:1px solid rgba(200,168,75,.4);border-radius:2px;padding:9px 13px;font-family:"IM Fell English",serif;font-size:.96rem;color:var(--ink);outline:none;width:100%;transition:border-color .2s,background .2s,box-shadow .2s;}
input:focus,textarea:focus{border-color:var(--lilac-dk);background:rgba(255,255,255,.88);box-shadow:0 0 0 3px rgba(136,112,176,.1);}
textarea{resize:vertical;min-height:100px;line-height:1.7;}
.option-row{display:flex;gap:24px;flex-wrap:wrap;align-items:flex-start;margin-top:4px;}
.opt-label{font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--navy);opacity:.6;font-weight:600;margin-bottom:6px;}
.swatches{display:flex;gap:7px;flex-wrap:wrap;}
.sw{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .15s,border-color .15s;display:flex;align-items:center;justify-content:center;font-size:13px;}
.sw:hover{transform:scale(1.18);}.sw.active{border-color:var(--ink);transform:scale(1.18);}
.btn-submit{display:block;width:100%;margin-top:20px;padding:13px 20px;background:linear-gradient(135deg,var(--navy) 0%,#3d3468 100%);color:var(--gold-lt);border:1px solid rgba(200,168,75,.4);font-family:"Cormorant Garamond",serif;font-size:1rem;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;}
.btn-submit::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,transparent 50%,rgba(200,168,75,.12));pointer-events:none;}
.btn-submit:hover{background:linear-gradient(135deg,#3d3468 0%,#5a4a90 100%);box-shadow:0 4px 18px rgba(50,30,80,.25);transform:translateY(-1px);}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.view-link-wrap{text-align:center;margin-top:24px;}
.view-link{display:inline-block;font-family:"Cormorant Garamond",serif;font-size:.92rem;letter-spacing:3px;text-transform:uppercase;color:var(--gold-dk);text-decoration:none;padding:10px 32px;background:rgba(253,248,238,.82);border:1px solid rgba(200,168,75,.5);border-radius:2px;transition:all .2s;backdrop-filter:blur(2px);}
.view-link:hover{background:rgba(253,248,238,.97);box-shadow:0 3px 14px rgba(100,60,0,.15);}
.toast{display:none;position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,rgba(45,36,80,.96),rgba(61,52,104,.96));color:var(--gold-lt);padding:14px 32px;border:1px solid rgba(200,168,75,.4);font-family:"Cormorant Garamond",serif;font-size:.95rem;letter-spacing:2px;box-shadow:0 6px 24px rgba(0,0,0,.25);z-index:999;white-space:nowrap;}
.toast.show{display:block;animation:toastIn .4s ease;}
.toast.error{background:linear-gradient(135deg,rgba(80,20,20,.96),rgba(100,30,30,.96));}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-22px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:rgba(232,220,200,.4)}::-webkit-scrollbar-thumb{background:rgba(136,112,176,.3);border-radius:3px}
</style>
</head>

      </div>
    </div>
    <button class="btn-submit" id="btn-submit" onclick="submitMsg()">✦ &nbsp; 편지 봉인하기 &nbsp; ✦</button>
  </div>

  <div class="view-link-wrap">
    <a href="view.html" class="view-link">❧ &nbsp; 도착한 편지 보기 &nbsp; ❧</a>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyD1GJHiaoJPCeQMz4yQmpRFgKA4xXhYs8A",
    authDomain: "hyobin-day.firebaseapp.com",
    projectId: "hyobin-day",
    storageBucket: "hyobin-day.firebasestorage.app",
    messagingSenderId: "465234754180",
    appId: "1:465234754180:web:dbe05b871aa850369be0d1",
    measurementId: "G-HF22GGV6X0"
  });
  const db  = getFirestore(app);

  let selColor = "ivory", selEmoji = "💌";

  document.querySelectorAll("[data-color]").forEach(el => {
    el.addEventListener("click", () => {
      document.querySelectorAll("[data-color]").forEach(e => e.classList.remove("active"));
      el.classList.add("active"); selColor = el.dataset.color;
    });
  });
  document.querySelectorAll("[data-emoji]").forEach(el => {
    el.addEventListener("click", () => {
      document.querySelectorAll("[data-emoji]").forEach(e => e.classList.remove("active"));
      el.classList.add("active"); selEmoji = el.dataset.emoji;
    });
  });

  function showToast(msg, isError=false) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = "toast show" + (isError ? " error" : "");
    setTimeout(() => { t.className = "toast"; }, 2500);
  }

  function shk(el) {
    let n=0;
    const iv = setInterval(() => {
      el.style.transform = n%2 ? "translateX(-6px)" : "translateX(6px)"; n++;
      if(n>6){ clearInterval(iv); el.style.transform=""; }
    }, 55);
  }

  window.submitMsg = async function() {
    const from = document.getElementById("inp-from").value.trim();
    const to   = document.getElementById("inp-to").value.trim();
    const msg  = document.getElementById("inp-msg").value.trim();
    if(!from || !msg){ shk(document.querySelector(".compose-wrap")); return; }

    const btn = document.getElementById("btn-submit");
    btn.disabled = true;
    btn.textContent = "봉인 중…";

    try {
      await addDoc(collection(db, "letters"), {
        from, to: to||"모두에게", msg,
        color: selColor, emoji: selEmoji,
        createdAt: serverTimestamp()
      });
      document.getElementById("inp-from").value = "";
      document.getElementById("inp-to").value   = "";
      document.getElementById("inp-msg").value  = "";
      showToast("✦  편지가 봉인되었습니다  ✦");
      setTimeout(() => { window.location.href = "view.html"; }, 1600);
    } catch(e) {
      console.error(e);
      showToast("❌  저장 실패. 잠시 후 다시 시도해주세요.", true);
      btn.disabled = false;
      btn.innerHTML = "✦ &nbsp; 편지 봉인하기 &nbsp; ✦";
    }
  };
</script>
</body>
</html>
